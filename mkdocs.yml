site_name: bagx
site_url: https://rsasaki0109.github.io/bagx/
site_description: Post-processing analysis engine for ROS2 rosbag data
repo_url: https://github.com/rsasaki0109/bagx
repo_name: rsasaki0109/bagx

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - eval — Quality Evaluation: guide/eval.md
      - compare — Bag Comparison: guide/compare.md
      - sync — Sync Analysis: guide/sync.md
      - export — Data Export: guide/export.md
      - anomaly — Anomaly Detection: guide/anomaly.md
      - scenario — Scene Extraction: guide/scenario.md
      - ask — LLM Queries: guide/ask.md
      - scene — 3D State: guide/scene.md
      - batch — Batch Processing: guide/batch.md
  - API Reference:
      - reader: api/reader.md
      - eval: api/eval.md
      - compare: api/compare.md
      - sync: api/sync.md
      - export: api/export.md
      - anomaly: api/anomaly.md
      - scenario: api/scenario.md
      - scene: api/scene.md
